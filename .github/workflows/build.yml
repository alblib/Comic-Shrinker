name: Production Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on v1.0, v2.1.4, etc.
  workflow_dispatch: # Allows you to test the build manually anytime

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # Native GH Action conditional: Only runs on Linux
    - name: Install Linux System Libraries
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk libwebp-dev

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Binary
      run: python build.py

    # Native GH Action conditional: Fix permissions for Unix-like systems
    - name: Set Executable Permissions (Linux/Mac)
      if: runner.os != 'Windows'
      run: chmod +x dist/ComicShrinker* || true

    - name: Rename Executables
      shell: bash # Windows에서도 bash 문법(mv)을 쓰기 위해 설정 (Git Bash 활용)
      run: |
        VERSION=${{ github.ref_name }}
        if [ "$RUNNER_OS" == "Windows" ]; then
          mv dist/ComicShrinker.exe dist/ComicShrinker_${VERSION}_win64.exe
        elif [ "$RUNNER_OS" == "macOS" ]; then
          mv dist/ComicShrinker dist/ComicShrinker_${VERSION}_macos.app
        else
          mv dist/ComicShrinker dist/ComicShrinker_${VERSION}_linux.run
        fi

    # This step creates a real GitHub Release and attaches the files
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/ComicShrinker*
        body: "Automated build for version ${{ github.ref_name }} (Pillow 12 Stable)"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}