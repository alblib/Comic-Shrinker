name: Production Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on v1.0, v2.1.4, etc.
  workflow_dispatch: # Allows you to test the build manually anytime

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Tk dependencies
      shell: bash
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            tk-dev \
            libwebp-dev

        elif [ "$RUNNER_OS" = "macOS" ]; then
          # Ensure stable Python (avoid broken system/Homebrew edge cases)
          brew install python@3.12
          brew install tcl-tk || true

          # Force correct Python
          export PATH="/opt/homebrew/bin:$PATH"
          python3.12 -m pip install --upgrade pip

          # Optional: ensure Tk paths are visible (rarely needed, but safe)
          export LDFLAGS="-L$(brew --prefix tcl-tk)/lib"
          export CPPFLAGS="-I$(brew --prefix tcl-tk)/include"
          export PKG_CONFIG_PATH="$(brew --prefix tcl-tk)/lib/pkgconfig"
        fi

        # Global Tk sanity check (applies to both OS)
        python -c "import tkinter as tk; print('Tk OK', tk.TkVersion, tk.TclVersion)"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Binary
      run: python build.py

    # Native GH Action conditional: Fix permissions for Unix-like systems
    - name: Set Executable Permissions (Linux/Mac)
      if: runner.os != 'Windows'
      run: chmod +x dist/ComicShrinker* || true

    - name: Rename and Package for Release
      shell: bash
      run: |
        VERSION=${{ github.ref_name }}
        cd dist/
        
        if [ "$RUNNER_OS" == "Windows" ]; then
          # Zip the exe (GitHub Windows runners have 7z installed)
          7z a ComicShrinker_${VERSION}_Win64.zip ComicShrinker.exe
          
        elif [ "$RUNNER_OS" == "macOS" ]; then
          # Package the .app folder into a ZIP
          zip -r ComicShrinker_${VERSION}_macOS.zip ComicShrinker.app
          
        else
          # Linux: Zip the binary
          zip ComicShrinker_${VERSION}_Linux.zip ComicShrinker
        
        fi

    # This step creates a real GitHub Release and attaches the files
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/ComicShrinker*.zip
        body: "Automated build for version ${{ github.ref_name }} (Pillow 12 Stable)"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}